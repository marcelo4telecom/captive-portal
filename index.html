<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4 Telecom - Conectar</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#001f4d,#004aad,#00a2ff);
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:22px;
    padding:35px 28px;
    box-shadow:0 8px 35px rgba(0,0,0,0.25);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo img{
    width:180px;
    max-width:100%;
}

.title{
    color:#fff;
    text-align:center;
    margin-bottom:8px;
    font-size:28px;
    font-weight:bold;
}

.subtitle{
    color:rgba(255,255,255,0.8);
    text-align:center;
    margin-bottom:30px;
    font-size:14px;
}

.form-group{
    margin-bottom:18px;
}

label{
    color:#fff;
    display:block;
    margin-bottom:8px;
    font-size:14px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:15px;
    outline:none;
    background:#fff;
}

input.error{
    border:2px solid #ff4d4d;
}

.error-message{
    color:#ffd2d2;
    font-size:12px;
    margin-top:6px;
    display:none;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#ffffff;
    color:#004aad;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

button:hover{
    transform:translateY(-2px);
}

.footer{
    text-align:center;
    color:rgba(255,255,255,0.75);
    font-size:12px;
    margin-top:20px;
}

@media(max-width:480px){
    .container{
        padding:28px 22px;
    }

    .title{
        font-size:24px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="logo">
        <img src="logo.jpeg" alt="4 Telecom">
    </div>

    <h1 class="title">Bem-vindo</h1>
    <p class="subtitle">Preencha os dados para entrarmos em contato!</p>

    <form id="portalForm">

        <div class="form-group">
            <label>Nome Completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome completo">
            <div class="error-message" id="nome-error">Nome completo é obrigatório.</div>
        </div>

        <div class="form-group">
            <label>Telefone</label>
            <input type="text" id="telefone" maxlength="15" placeholder="(00) 00000-0000">
            <div class="error-message" id="telefone-error">Telefone é obrigatório.</div>
        </div>

        <div class="form-group">
            <label>CPF</label>
            <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00">
            <div class="error-message" id="cpf-error">CPF inválido ou obrigatório.</div>
        </div>

        <div class="form-group">
            <label>CEP</label>
            <input type="text" id="cep" maxlength="9" placeholder="00000-000">
            <div class="error-message" id="cep-error">CEP é obrigatório.</div>
        </div>

        <button type="submit">Cadastrar</button>

    </form>

    <div class="footer">
        © 2026 4 Telecom
    </div>

</div>

<script>
const telefone = document.getElementById('telefone');
const cpf = document.getElementById('cpf');
const cep = document.getElementById('cep');

telefone.addEventListener('input', () => {
    let v = telefone.value.replace(/\D/g,'');
    v = v.replace(/^(\d{2})(\d)/g,'($1) $2');
    v = v.replace(/(\d{5})(\d)/,'$1-$2');
    telefone.value = v;
});

cpf.addEventListener('input', () => {
    let v = cpf.value.replace(/\D/g,'');
    v = v.replace(/(\d{3})(\d)/,'$1.$2');
    v = v.replace(/(\d{3})(\d)/,'$1.$2');
    v = v.replace(/(\d{3})(\d{1,2})$/,'$1-$2');
    cpf.value = v;
});

cep.addEventListener('input', () => {
    let v = cep.value.replace(/\D/g,'');
    v = v.replace(/(\d{5})(\d)/,'$1-$2');
    cep.value = v;
});

function validarCPF(cpf){
    cpf = cpf.replace(/[^\d]+/g,'');

    if(cpf.length !== 11 || /^(\d)\1+$/.test(cpf))
        return false;

    let soma = 0;
    let resto;

    for(let i=1; i<=9; i++)
        soma += parseInt(cpf.substring(i-1, i)) * (11 - i);

    resto = (soma * 10) % 11;

    if((resto == 10) || (resto == 11))
        resto = 0;

    if(resto != parseInt(cpf.substring(9,10)))
        return false;

    soma = 0;

    for(let i = 1; i <= 10; i++)
        soma += parseInt(cpf.substring(i-1, i)) * (12 - i);

    resto = (soma * 10) % 11;

    if((resto == 10) || (resto == 11))
        resto = 0;

    if(resto != parseInt(cpf.substring(10,11)))
        return false;

    return true;
}

document.getElementById('portalForm').addEventListener('submit', function(e){
    e.preventDefault();

    let valid = true;

    const nome = document.getElementById('nome');
    const telefone = document.getElementById('telefone');
    const cpf = document.getElementById('cpf');
    const cep = document.getElementById('cep');

    function erro(campo, mensagem){
        campo.classList.add('error');
        document.getElementById(mensagem).style.display = 'block';
        valid = false;
    }

    function limpar(campo, mensagem){
        campo.classList.remove('error');
        document.getElementById(mensagem).style.display = 'none';
    }

    if(nome.value.trim() === ''){
        erro(nome,'nome-error');
    }else{
        limpar(nome,'nome-error');
    }

    if(telefone.value.trim().length < 14){
        erro(telefone,'telefone-error');
    }else{
        limpar(telefone,'telefone-error');
    }

    if(!validarCPF(cpf.value)){
        erro(cpf,'cpf-error');
    }else{
        limpar(cpf,'cpf-error');
    }

    if(cep.value.trim().length < 9){
        erro(cep,'cep-error');
    }else{
        limpar(cep,'cep-error');
    }

    if(valid){

        const params = new URLSearchParams(window.location.search);

        const redirectUri = params.get('redirect_uri');
        const userHash = params.get('user_hash');
        const continueUrl = params.get('continue');

        const formData = new URLSearchParams();

        formData.append("nome", nome.value);
        formData.append("telefone", telefone.value);
        formData.append("cpf", cpf.value);
        formData.append("cep", cep.value);

        fetch("https://script.google.com/macros/s/AKfycbyjZY1ev22iaRvtF4mqHHKzpBPESYyGbbjmrUq3K9c-8SWTAXpGAP0_T0_OjIMoE6EqHQ/exec", {
            method: "POST",
            body: formData
        })
        .then((response) => {

            if (!response.ok) {
                throw new Error("Salvo com Sucesso");
            }

            if (redirectUri && userHash) {

                const liberar = `${redirectUri}?user_hash=${encodeURIComponent(userHash)}&continue=${encodeURIComponent(continueUrl || '')}`;
                window.location.href = liberar;

            } else {
                alert('Salvo com Sucesso.');
            }

        })
        .catch((error) => {
            console.error(error);
            alert("Salvo com Sucesso.");
        });

    }
});
</script>

</body>
</html>
